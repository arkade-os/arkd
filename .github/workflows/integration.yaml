name: ci_integration

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'

jobs:
  test:
    name: ${{ matrix.env_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_target: docker-run
            env_name: postgres/redis
          - env_target: docker-run-light
            env_name: sqlite/badger
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start arkade-regtest base stack (Bitcoin Core + Fulcrum + mempool)
        # AUTOMINE_INTERVAL=0 keeps block production explicit: the e2e tests mine
        # on demand and assert exact block heights, so a background auto-miner
        # would make them non-deterministic.
        run: AUTOMINE_INTERVAL=0 REGTEST_PROFILES=base node regtest/regtest.mjs start

      - name: Run Arkd and Arkd Wallet
        run: make ${{ matrix.env_target }}

      - name: Run test
        run: make integrationtest
      
      - name: Capture arkd logs
        if: failure()
        run: |
          echo "=== Arkd Logs ==="
          docker logs arkd
          echo "=== End Arkd Logs ==="
      
      - name: Tear down
        if: always()
        run: |
          make docker-stop || true
          node regtest/regtest.mjs clean || true
