syntax = "proto3";

package ark.v1;

import "ark/v1/options.proto";

// TestVersionService exists solely for integration tests that verify
// buildVersionMaps discovers service-level and method-level version
// annotations via proto reflection.  It is never registered with a
// real gRPC server.
service TestVersionService {
  option (ark.v1.service_min_sdk_version) = "1.0.0";

  // BreakingMethod has a method-level minimum higher than the service.
  rpc BreakingMethod(BreakingMethodRequest) returns (BreakingMethodResponse) {
    option (ark.v1.min_sdk_version) = "2.0.0";
  }

  // StableMethod has no method-level annotation; the service minimum applies.
  rpc StableMethod(StableMethodRequest) returns (StableMethodResponse) {}
}

message BreakingMethodRequest {}
message BreakingMethodResponse {}
message StableMethodRequest {}
message StableMethodResponse {}
